# Nginx配置模板
# 书驿云桥前端应用

upstream backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name bookbridge.com www.bookbridge.com;

    # 重定向HTTP到HTTPS
    if ($scheme = http) {
        return 301 https://$server_name$request_uri;
    }

    # HTTPS配置
    listen 443 ssl http2;
    ssl_certificate /etc/nginx/ssl/bookbridge.com.crt;
    ssl_certificate_key /etc/nginx/ssl/bookbridge.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:;";

    # 根目录
    root /usr/share/nginx/html;
    index index.html;

    # 静态文件配置
    location / {
        try_files $uri $uri/ /index.html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Vary Accept-Encoding;
    }

    # 静态资源缓存配置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Vary Accept-Encoding;
    }

    # API代理
    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
        proxy_http_version 1.1;
        proxy_set_header Connection "keep-alive";
    }

    # 健康检查
    location /health {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;

    # 限制请求大小
    client_max_body_size 10M;

    # 日志配置
    access_log /var/log/nginx/bookbridge.access.log combined;
    error_log /var/log/nginx/bookbridge.error.log warn;
}